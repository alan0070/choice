<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3인 전용: 현실 밀착형 100인 월드컵</title>
    <style>
        :root { --main-gold: #d4af37; --bg-dark: #1a1a1a; }
        body { background: var(--bg-dark); color: white; font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* 메인 대시보드 */
        .player-select { display: flex; justify-content: center; gap: 30px; margin-top: 50px; }
        .player-card { cursor: pointer; transition: 0.3s; border: 2px solid transparent; padding: 10px; border-radius: 15px; }
        .player-card:hover { transform: translateY(-10px); border-color: var(--main-gold); }
        .player-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid var(--main-gold); }

        /* 월드컵 매치 화면 */
        #game-screen { display: none; margin-top: 50px; }
        .match-up { display: flex; justify-content: center; align-items: center; gap: 50px; }
        .candidate { width: 400px; cursor: pointer; transition: 0.2s; position: relative; }
        .candidate img { width: 100%; border-radius: 15px; border: 5px solid #333; }
        .candidate:hover img { border-color: var(--main-gold); box-shadow: 0 0 20px var(--main-gold); }
        .vs { font-size: 50px; font-weight: bold; color: var(--main-gold); }

        /* 결과 화면 */
        #result-screen { display: none; }
        .result-board { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .final-card { background: #2a2a2a; padding: 20px; border-radius: 15px; width: 300px; }
        .ai-comment { font-size: 0.9rem; color: #aaa; margin-top: 15px; line-height: 1.5; background: #333; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container" id="main-lobby">
    <h1 style="color: var(--main-gold);">Secret Ideal World Cup</h1>
    <p>플레이어를 선택하여 게임을 시작하세요.</p>
    <div class="player-select">
        <div class="player-card" onclick="startGame('태구')">
            <img src="https://i.ibb.co/vzYpT8m/taegu.png" class="player-img"> <h2>태구</h2>
        </div>
        <div class="player-card" onclick="startGame('민')">
            <img src="https://i.ibb.co/M7XzX7B/min.png" class="player-img"> <h2>민</h2>
        </div>
        <div class="player-card" onclick="startGame('충')">
            <img src="https://i.ibb.co/mH0Q0Q0/choong.png" class="player-img"> <h2>충</h2>
        </div>
    </div>
</div>

<div id="game-screen">
    <h2 id="round-title" style="color: var(--main-gold);">16강 진행 중</h2>
    <div class="match-up">
        <div id="left-side" class="candidate" onclick="selectWinner(0)"></div>
        <div class="vs">VS</div>
        <div id="right-side" class="candidate" onclick="selectWinner(1)"></div>
    </div>
</div>

<div id="result-screen">
    <h1 style="color: var(--main-gold);">오늘의 최종 초이스</h1>
    <div id="dashboard-results" class="result-board"></div>
    <button onclick="location.reload()" style="margin-top: 30px; padding: 15px 30px; cursor:pointer;">다시 하기</button>
</div>

<script>
// --- 데이터 및 상태 관리 ---
const categories = ["오피스", "캠퍼스", "카페", "운동", "힙스터", "청순", "성숙", "집순이", "강남미인", "일본여자"];
const candidatePool = []; 

// 100명 후보 자동 생성 (임시 이미지 사용, 실제 이미지로 대체 가능)
categories.forEach(cat => {
    for(let i=1; i<=10; i++) {
        candidatePool.push({
            name: `${cat} ${i}번`,
            category: cat,
            img: `https://picsum.photos/seed/${cat}${i}/400/600`, // 실제 생성한 AI 이미지 URL로 교체
            tags: [cat, i % 2 === 0 ? "안경" : "단발"]
        });
    }
});

let currentPlayer = "";
let currentMatch = [];
let winners = [];
let roundCandidates = [];

// --- 게임 로직 ---
function startGame(name) {
    currentPlayer = name;
    document.getElementById('main-lobby').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    
    // 100명 중 랜덤 16명 추출
    roundCandidates = candidatePool.sort(() => 0.5 - Math.random()).slice(0, 16);
    setupMatch();
}

function setupMatch() {
    if (roundCandidates.length === 1) {
        saveAndShowResult(roundCandidates[0]);
        return;
    }
    
    if (roundCandidates.length === 16) document.getElementById('round-title').innerText = "16강";
    if (roundCandidates.length === 8) document.getElementById('round-title').innerText = "8강";
    if (roundCandidates.length === 4) document.getElementById('round-title').innerText = "4강 (준결승)";
    if (roundCandidates.length === 2) document.getElementById('round-title').innerText = "결승전";

    currentMatch = [roundCandidates[0], roundCandidates[1]];
    document.getElementById('left-side').innerHTML = `<img src="${currentMatch[0].img}"><p>${currentMatch[0].name}</p>`;
    document.getElementById('right-side').innerHTML = `<img src="${currentMatch[1].img}"><p>${currentMatch[1].name}</p>`;
}

function selectWinner(index) {
    winners.push(currentMatch[index]);
    roundCandidates.splice(0, 2);
    
    if (roundCandidates.length === 0) {
        roundCandidates = winners;
        winners = [];
    }
    setupMatch();
}

// --- 결과 저장 및 AI 코멘트 ---
function saveAndShowResult(winner) {
    const history = JSON.parse(localStorage.getItem('wc_results') || '{}');
    history[currentPlayer] = { ...winner, time: new Date().toLocaleString() };
    localStorage.setItem('wc_results', JSON.stringify(history));

    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    renderDashboard();
}

function renderDashboard() {
    const history = JSON.parse(localStorage.getItem('wc_results') || '{}');
    const board = document.getElementById('dashboard-results');
    board.innerHTML = "";

    ["태구", "민", "충"].forEach(name => {
        const data = history[name];
        if (data) {
            const comment = getAIComment(name, data);
            board.innerHTML += `
                <div class="final-card">
                    <h3>${name}의 픽</h3>
                    <img src="${data.img}" style="width:100%; border-radius:10px;">
                    <p><b>${data.name}</b></p>
                    <div class="ai-comment">🤖 AI 분석: "${comment}"</div>
                </div>
            `;
        }
    });
}

function getAIComment(name, data) {
    if (data.category === "강남미인") return `${name}님은 화려하고 도시적인 세련된 미인을 선호하시네요! 눈이 아주 높으십니다. ✨`;
    if (data.category === "일본여자") return `${name}님은 투명하고 아기자기한 감성을 최종 선택하셨네요! 유니크한 취향입니다. 🇯🇵`;
    if (data.category === "오피스") return `${name}님은 스마트하고 지적인 스타일을 선호하시네요. 특히 '안경' 쓴 지적인 모습에 반응하신 듯! 👓`;
    return `${name}님은 ${data.category} 스타일을 선호하시는군요! 확고한 취향이 느껴집니다. 👍`;
}
</script>
</body>
</html>
