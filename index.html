<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3인 전용: 현실 밀착형 100인 월드컵</title>
    <style>
        :root { --main-gold: #d4af37; --bg-dark: #121212; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 30px 10px; }
        
        /* 로비 스타일 */
        .player-select { display: flex; justify-content: center; gap: 20px; margin-top: 50px; flex-wrap: wrap; }
        .player-card { cursor: pointer; border: 2px solid #444; padding: 15px; border-radius: 20px; background: #1e1e1e; width: 180px; }
        .player-card:hover { border-color: var(--main-gold); transform: translateY(-5px); transition: 0.3s; }
        .p-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--main-gold); margin-bottom: 10px; }

        /* 게임 화면 */
        #game-screen { display: none; }
        .match-up { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 30px; flex-wrap: wrap; }
        .candidate { width: 350px; cursor: pointer; }
        .candidate img { width: 100%; height: 500px; border-radius: 15px; object-fit: cover; border: 3px solid #333; }
        .candidate:hover img { border-color: var(--main-gold); }

        /* 결과 화면 */
        #result-screen { display: none; }
        .final-card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 280px; margin: 10px auto; border: 1px solid #333; }
        .win-img { width: 100%; height: 350px; object-fit: cover; border-radius: 10px; }
        
        button { background: var(--main-gold); color: black; border:none; padding: 10px 30px; border-radius: 20px; font-weight: bold; cursor:pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="main-lobby">
    <h1 style="color: var(--main-gold);">Secret Ideal World Cup</h1>
    <div class="player-select">
        <div class="player-card" onclick="startGame('태구')">
            <img src="./taegu.png" class="p-img" onerror="this.src='https://ui-avatars.com/api/?name=TG&background=d4af37&color=fff'">
            <h3>태구</h3>
        </div>
        <div class="player-card" onclick="startGame('민')">
            <img src="./min.png" class="p-img" onerror="this.src='https://ui-avatars.com/api/?name=MIN&background=d4af37&color=fff'">
            <h3>민</h3>
        </div>
        <div class="player-card" onclick="startGame('충')">
            <img src="./choong.png" class="p-img" onerror="this.src='https://ui-avatars.com/api/?name=CH&background=d4af37&color=fff'">
            <h3>충</h3>
        </div>
    </div>
</div>

<div class="container" id="game-screen">
    <h2 id="round-title" style="color: var(--main-gold);">16강</h2>
    <div class="match-up">
        <div id="left-side" class="candidate" onclick="selectWinner(0)"></div>
        <div style="font-size: 40px; color: var(--main-gold); font-weight: 900;">VS</div>
        <div id="right-side" class="candidate" onclick="selectWinner(1)"></div>
    </div>
    <button onclick="undo()" id="undo-btn" style="background: #444; color: #ccc; display:none;">뒤로가기</button>
</div>

<div class="container" id="result-screen">
    <h1 style="color: var(--main-gold);">Dashboard</h1>
    <div id="dashboard-results" style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;"></div>
    <button onclick="location.reload()">다시 하기</button>
</div>

<script>
// 데이터 미리 생성
const candidates = [];
const cats = ["오피스", "캠퍼스", "운동", "청순", "성숙", "힙스터", "카페", "일본"];
for(let i=1; i<=100; i++) {
    candidates.push({
        id: i,
        name: cats[i%cats.length] + " 스타일 #" + i,
        img: "https://picsum.photos/id/" + (i + 10) + "/600/900"
    });
}

let user = "";
let pool = [];
let winners = [];
let currentPair = [];
let history = [];

function startGame(name) {
    user = name;
    document.getElementById('main-lobby').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    
    // 셔플 후 16명 추출
    pool = [...candidates].sort(() => Math.random() - 0.5).slice(0, 16);
    winners = [];
    history = [];
    
    render();
}

function render() {
    if (pool.length === 1 && winners.length === 0) {
        finish(pool[0]);
        return;
    }
    
    if (pool.length === 0) {
        pool = [...winners];
        winners = [];
    }

    const roundText = pool.length + winners.length * 2;
    document.getElementById('round-title').innerText = roundText === 2 ? "결승전" : roundText + "강";
    document.getElementById('undo-btn').style.display = history.length > 0 ? "inline-block" : "none";

    currentPair = [pool[0], pool[1]];
    document.getElementById('left-side').innerHTML = '<img src="'+currentPair[0].img+'"><p>'+currentPair[0].name+'</p>';
    document.getElementById('right-side').innerHTML = '<img src="'+currentPair[1].img+'"><p>'+currentPair[1].name+'</p>';
}

function selectWinner(idx) {
    history.push({ p: [...pool], w: [...winners] });
    winners.push(currentPair[idx]);
    pool.splice(0, 2);
    render();
}

function undo() {
    if (history.length === 0) return;
    const last = history.pop();
    pool = last.p;
    winners = last.w;
    render();
}

function finish(winner) {
    const data = JSON.parse(localStorage.getItem('final_v6') || '{}');
    data[user] = winner;
    localStorage.setItem('final_v6', JSON.stringify(data));
    
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    const board = document.getElementById('dashboard-results');
    board.innerHTML = "";
    ["태구", "민", "충"].forEach(n => {
        if(data[n]) {
            board.innerHTML += '<div class="final-card"><h3>'+n+'의 픽</h3><img src="'+data[n].img+'" class="win-img"><p>'+data[n].name+'</p><p style="color:#00ffcc">다낭 지수: '+ (Math.floor(Math.random()*10)+85) +'%</p></div>';
        }
    });
}
</script>
</body>
</html>
