<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이상형 월드컵 🏆</title>
    <style>
        :root { --gold: #d4af37; --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100vh; }
        .container { max-width: 920px; margin: 0 auto; padding: 24px 16px; }

        #lobby { text-align: center; padding-top: 40px; }
        #lobby h1 { font-size: 2.2rem; color: var(--gold); letter-spacing: 3px; font-weight: 700; }
        #lobby p { color: #666; margin-top: 10px; font-size: 0.9rem; }
        .player-grid { display: flex; justify-content: center; gap: 20px; margin-top: 40px; flex-wrap: wrap; }
        .player-card { cursor: pointer; border: 2px solid var(--border); border-radius: 20px; background: var(--card); width: 150px; padding: 20px 10px; transition: border-color 0.2s, transform 0.2s; text-align: center; }
        .player-card:hover { border-color: var(--gold); transform: translateY(-6px); }
        .player-card img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); background: #333; }
        .player-card h3 { margin-top: 12px; font-size: 1rem; color: #ddd; font-weight: 500; }

        #game { display: none; }
        .game-header { text-align: center; margin-bottom: 20px; }
        .game-header h2 { font-size: 1.5rem; color: var(--gold); font-weight: 700; }
        .progress-wrap { max-width: 500px; margin: 10px auto 6px; }
        .progress-bar { height: 5px; background: #2a2a2a; border-radius: 3px; }
        .progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.4s ease; }
        .progress-label { font-size: 0.75rem; color: #555; text-align: right; margin-top: 4px; }

        .matchup { display: flex; align-items: stretch; justify-content: center; gap: 12px; }
        .candidate { flex: 1; max-width: 400px; cursor: pointer; border: 2px solid var(--border); border-radius: 16px; overflow: hidden; background: var(--card); transition: border-color 0.15s, transform 0.15s; position: relative; }
        .candidate:hover { border-color: var(--gold); transform: scale(1.02); }
        .candidate:hover .hover-overlay { opacity: 1; }
        .hover-overlay { position: absolute; inset: 0; background: rgba(212,175,55,0.08); opacity: 0; transition: opacity 0.15s; pointer-events: none; }
        .candidate img { width: 100%; height: 480px; object-fit: cover; object-position: top center; display: block; background: #222; border-radius: 14px; }
        .ph { width: 100%; height: 480px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: #444; font-size: 0.82rem; background: #1a1a1a; border-radius: 14px; }
        .spinner { width: 28px; height: 28px; border: 2px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .vs-col { display: flex; align-items: center; padding: 0 4px; flex-shrink: 0; }
        .vs-text { font-size: 1.8rem; font-weight: 900; color: var(--gold); }

        .ctrl { text-align: center; margin-top: 16px; }
        .btn { border: none; padding: 10px 28px; border-radius: 24px; font-weight: 700; cursor: pointer; font-size: 0.88rem; }
        .btn-gold { background: var(--gold); color: #111; }
        .btn-dark { background: #252525; color: #aaa; border: 1px solid #333; }
        .btn-dark:hover { background: #333; color: #fff; }

        #result { display: none; text-align: center; padding-top: 40px; }
        #result h1 { font-size: 1.8rem; color: var(--gold); }
        #result .sub { color: #555; margin-top: 8px; font-size: 0.85rem; }
        .dashboard { display: flex; justify-content: center; gap: 20px; margin-top: 32px; flex-wrap: wrap; align-items: flex-start; }
        .final-card { width: 240px; text-align: center; }
        .final-label { font-size: 0.9rem; color: #888; margin-bottom: 10px; font-weight: 500; }
        .final-label span { color: var(--gold); }
        .final-img-wrap { border-radius: 16px; overflow: hidden; border: 2px solid var(--border); }
        .final-img-wrap img { width: 100%; height: 320px; object-fit: cover; object-position: top center; display: block; background: #222; }
        .waiting { color: #444; font-size: 0.8rem; padding: 30px 10px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); }
    </style>
</head>
<body>
<div class="container">

    <div id="lobby">
        <h1>🏆 이상형 월드컵</h1>
        <p>플레이어를 선택하고 이상형을 만나보세요</p>
        <div class="player-grid">
            <div class="player-card" onclick="startGame('태구')">
                <img src="taegu.png" onerror="this.src='https://ui-avatars.com/api/?name=TG&background=d4af37&color=111&size=90'">
                <h3>태구</h3>
            </div>
            <div class="player-card" onclick="startGame('민')">
                <img src="min.png" onerror="this.src='https://ui-avatars.com/api/?name=MIN&background=d4af37&color=111&size=90'">
                <h3>민</h3>
            </div>
            <div class="player-card" onclick="startGame('충')">
                <img src="choong.png" onerror="this.src='https://ui-avatars.com/api/?name=CH&background=d4af37&color=111&size=90'">
                <h3>충</h3>
            </div>
        </div>
    </div>

    <div id="game">
        <div class="game-header">
            <h2 id="round-title">16강</h2>
            <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
                <div class="progress-label" id="prog-label"></div>
            </div>
        </div>
        <div class="matchup">
            <div class="candidate" id="left" onclick="pick(0)"></div>
            <div class="vs-col"><div class="vs-text">VS</div></div>
            <div class="candidate" id="right" onclick="pick(1)"></div>
        </div>
        <div class="ctrl">
            <button class="btn btn-dark" id="undo-btn" onclick="undo()" style="display:none;">↩ 이전으로</button>
        </div>
    </div>

    <div id="result">
        <h1>🏆 결과</h1>
        <p class="sub">플레이어의 선택</p>
        <div class="dashboard" id="board"></div>
        <br><br>
        <button class="btn btn-gold" onclick="location.reload()">새 게임 시작</button>
    </div>

</div>
<script>
const UNSPLASH_KEY = "yK6ETlAX_A3MWStW38SJehFXjblYgAr4xE7N_UTwwBE";

const QUERIES = [
    "young beautiful korean woman portrait",
    "cute pretty asian girl face",
    "young pretty japanese woman portrait",
    "beautiful asian girl smiling",
    "pretty korean girl selfie portrait",
    "young attractive asian woman fashion",
    "cute asian girl aesthetic portrait",
    "beautiful young japanese girl face",
    "pretty asian woman model portrait",
    "young beautiful asian girl closeup"
];

let candidates = [];
let user = "", pool = [], winners = [], cur = [], history = [];

async function preload() {
    const status = document.createElement('p');
    status.id = 'load-status';
    status.style.cssText = 'color:#555;margin-top:20px;';
    status.innerText = '사진 불러오는 중...';
    document.getElementById('lobby').appendChild(status);

    const results = [];
    for (let cat = 0; cat < QUERIES.length; cat++) {
        try {
            const res = await fetch(
                `https://api.unsplash.com/photos/random?query=${encodeURIComponent(QUERIES[cat])}&orientation=portrait&count=10&client_id=${UNSPLASH_KEY}`
            );
            const photos = await res.json();
            photos.forEach((p, j) => {
                results.push({ id: cat * 10 + j, img: p.urls.regular });
            });
        } catch(e) {
            for (let j = 0; j < 10; j++) {
                results.push({
                    id: cat * 10 + j,
                    img: `https://source.unsplash.com/600x900/?${QUERIES[cat].replace(/ /g,'+')}&sig=${cat*10+j}`
                });
            }
        }
    }
    candidates = results;
    document.getElementById('load-status')?.remove();
}

function saves() { return JSON.parse(localStorage.getItem('wc_v14') || '{}'); }
function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

async function startGame(name) {
    user = name;
    if (candidates.length === 0) await preload();
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    pool = shuffle(candidates).slice(0, 16);
    winners = []; history = [];
    render();
}

function cardHTML(c) {
    return `
        <div class="hover-overlay"></div>
        <div class="ph"><div class="spinner"></div><span>로딩중...</span></div>
        <img src="${c.img}" style="display:none"
            onload="this.previousElementSibling.style.display='none'; this.style.display='block';"
            onerror="this.previousElementSibling.innerHTML='<span style=font-size:2rem>🙈</span><span>로딩 실패</span>';">`;
}

function render() {
    if (pool.length === 0 && winners.length === 1) { finish(winners[0]); return; }
    if (pool.length === 0) { pool = shuffle(winners); winners = []; }

    const total = pool.length + winners.length * 2;
    const roundName = total >= 16 ? "16강" : total >= 8 ? "8강" : total >= 4 ? "4강" : "🔥 결승";
    document.getElementById('round-title').innerText = roundName;

    const done = 16 - total;
    document.getElementById('prog-fill').style.width = Math.round((done / 15) * 100) + '%';
    document.getElementById('prog-label').innerText = `${done + 1} / 16 경기`;
    document.getElementById('undo-btn').style.display = history.length ? 'inline-block' : 'none';

    cur = [pool[0], pool[1]];
    document.getElementById('left').innerHTML = cardHTML(cur[0]);
    document.getElementById('right').innerHTML = cardHTML(cur[1]);
}

function pick(idx) {
    history.push({ pool: [...pool], winners: [...winners] });
    winners.push(cur[idx]);
    pool.splice(0, 2);
    render();
}

function undo() {
    if (!history.length) return;
    const s = history.pop();
    pool = s.pool; winners = s.winners;
    render();
}

function finish(winner) {
    const s = saves();
    s[user] = winner;
    localStorage.setItem('wc_v14', JSON.stringify(s));
    document.getElementById('game').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    const board = document.getElementById('board');
    board.innerHTML = '';
    ['태구', '민', '충'].forEach(n => {
        const p = s[n];
        board.innerHTML += p
            ? `<div class="final-card">
                <div class="final-label"><span>${n}</span>의 선택</div>
                <div class="final-img-wrap">
                    <img src="${p.img}" onerror="this.style.background='#333'">
                </div>
               </div>`
            : `<div class="final-card">
                <div class="final-label"><span>${n}</span></div>
                <div class="waiting">아직 플레이 전</div>
               </div>`;
    });
}

preload();
</script>
</body>
</html>
