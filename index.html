<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3인 전용: 현실 밀착형 100인 월드컵</title>
    <style>
        :root { --main-gold: #d4af37; --bg-dark: #121212; }
        body { background: var(--bg-dark); color: white; font-family: 'Pretendard', sans-serif; text-align: center; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        h1 { color: var(--main-gold); font-size: 2.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
        
        .player-select { display: flex; justify-content: center; gap: 40px; margin-top: 60px; }
        .player-card { cursor: pointer; transition: 0.4s; border: 2px solid #333; padding: 20px; border-radius: 25px; background: #1a1a1a; width: 220px; }
        .player-card:hover { transform: translateY(-15px); border-color: var(--main-gold); box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4); }
        .player-img { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 4px solid var(--main-gold); margin-bottom: 20px; background: #333; }

        #game-screen { display: none; margin-top: 50px; }
        .match-up { display: flex; justify-content: center; align-items: center; gap: 70px; margin-top: 40px; }
        .candidate { width: 420px; cursor: pointer; transition: 0.3s; position: relative; }
        .candidate img { width: 100%; height: 580px; border-radius: 25px; border: 5px solid #222; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
        .candidate:hover img { border-color: var(--main-gold); transform: scale(1.03); }
        .vs { font-size: 70px; font-weight: 900; font-style: italic; color: var(--main-gold); text-shadow: 3px 3px 15px rgba(212, 175, 55, 0.6); }

        #result-screen { display: none; }
        .result-board { display: flex; justify-content: center; gap: 30px; margin-top: 50px; flex-wrap: wrap; }
        .final-card { background: #1e1e1e; padding: 30px; border-radius: 25px; width: 310px; border: 1px solid #383838; }
        .winner-img-final { width: 100%; height: 400px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; border: 2px solid #444; }
        .ai-comment { font-size: 0.95rem; color: #ccc; margin-top: 20px; line-height: 1.7; background: #262626; padding: 20px; border-radius: 15px; text-align: left; }
        .danang-score { margin-top: 15px; color: #00ffcc; font-weight: bold; font-size: 1.2rem; border-top: 1px solid #444; padding-top: 15px; text-align: center; }
        button { background: var(--main-gold); color: black; border:none; padding: 18px 50px; border-radius: 40px; font-weight: 900; cursor:pointer; font-size: 1.1rem; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container" id="main-lobby">
    <h1>Secret Ideal World Cup</h1>
    <p style="color: #aaa; font-size: 1.1rem;">태구, 민, 충 중 플레이어를 선택하세요.</p>
    <div class="player-select">
        <div class="player-card" onclick="startGame('태구')">
            <img src="./taegu.png" class="player-img" onerror="this.src='https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&h=200&fit=crop'">
            <h2 style="margin:0;">태구</h2>
        </div>
        <div class="player-card" onclick="startGame('민')">
            <img src="./min.png" class="player-img" onerror="this.src='https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200&h=200&fit=crop'">
            <h2 style="margin:0;">민</h2>
        </div>
        <div class="player-card" onclick="startGame('충')">
            <img src="./choong.png" class="player-img" onerror="this.src='https://images.unsplash.com/photo-1492562080023-ab3db95bfbce?w=200&h=200&fit=crop'">
            <h2 style="margin:0;">충</h2>
        </div>
    </div>
</div>

<div id="game-screen" class="container">
    <h2 id="round-title" style="color: var(--main-gold); font-size: 2.2rem;">라운드</h2>
    <div class="match-up">
        <div id="left-side" class="candidate" onclick="selectWinner(0)"></div>
        <div class="vs">VS</div>
        <div id="right-side" class="candidate" onclick="selectWinner(1)"></div>
    </div>
</div>

<div id="result-screen" class="container">
    <h1>Secret Dashboard</h1>
    <div id="dashboard-results" class="result-board"></div>
    <div style="margin-top: 50px;"><button onclick="location.reload()">다시 하기</button></div>
</div>

<script>
// --- 확실하게 로딩되는 고퀄리티 실사 이미지 엔진 ---
const categories = ["오피스", "캠퍼스", "카페", "운동", "힙스터", "청순", "성숙", "집순이", "강남미인", "일본여자"];
const candidatePool = []; 

categories.forEach((cat, cIdx) => {
    for(let i=1; i<=10; i++) {
        const seed = (cIdx * 10) + i;
        // Unsplash의 고해상도 실사 이미지를 키워드별로 매칭 (로딩 보장)
        const keywords = {
            "오피스": "korean-woman-office",
            "캠퍼스": "korean-girl-student",
            "카페": "korean-girl-cafe",
            "운동": "fitness-korean-woman",
            "힙스터": "fashion-korean-girl",
            "청순": "korean-beauty-natural",
            "성숙": "sophisticated-korean-woman",
            "집순이": "cozy-korean-girl",
            "강남미인": "glamorous-korean-woman",
            "일본여자": "japanese-girl-street"
        };
        candidatePool.push({
            name: `${cat} Style #${i}`,
            category: cat,
            img: `https://loremflickr.com/600/900/${keywords[cat] || 'beauty-woman'}/all?lock=${seed}`, 
            tags: [cat]
        });
    }
});

let currentPlayer = "";
let winners = [];
let roundCandidates = [];
let currentMatch = [];

function startGame(name) {
    currentPlayer = name;
    document.getElementById('main-lobby').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    roundCandidates = candidatePool.sort(() => 0.5 - Math.random()).slice(0, 16);
    setupMatch();
}

function setupMatch() {
    if (roundCandidates.length === 1) {
        saveAndShowResult(roundCandidates[0]);
        return;
    }
    const titles = {16: "16강 진출전", 8: "8강 토너먼트", 4: "4강 (준결승)", 2: "🔥 파이널 결승전 🔥"};
    document.getElementById('round-title').innerText = titles[roundCandidates.length] || "매치 진행 중";

    currentMatch = [roundCandidates[0], roundCandidates[1]];
    document.getElementById('left-side').innerHTML = `<img src="${currentMatch[0].img}"><p style='font-size:1.2rem; margin-top:15px;'>${currentMatch[0].name}</p>`;
    document.getElementById('right-side').innerHTML = `<img src="${currentMatch[1].img}"><p style='font-size:1.2rem; margin-top:15px;'>${currentMatch[1].name}</p>`;
}

function selectWinner(index) {
    winners.push(currentMatch[index]);
    roundCandidates.splice(0, 2);
    if (roundCandidates.length === 0) { roundCandidates = winners; winners = []; }
    setupMatch();
}

function saveAndShowResult(winner) {
    const history = JSON.parse(localStorage.getItem('wc_results_v4') || '{}');
    history[currentPlayer] = { ...winner, time: new Date().toLocaleString() };
    localStorage.setItem('wc_results_v4', JSON.stringify(history));
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    renderDashboard();
}

function renderDashboard() {
    const history = JSON.parse(localStorage.getItem('wc_results_v4') || '{}');
    const board = document.getElementById('dashboard-results');
    board.innerHTML = "";
    ["태구", "민", "충"].forEach(name => {
        const data = history[name];
        if (data) {
            const score = Math.floor(Math.random() * 15) + 82; 
            board.innerHTML += `
                <div class="final-card">
                    <h2 style="color:var(--main-gold);">${name}의 최애</h2>
                    <img src="${data.img}" class="winner-img-final">
                    <p><b>${data.category} 스타일</b></p>
                    <div class="ai-comment">🤖 <b>AI 분석:</b> ${getAIComment(name, data)}
                        <div class="danang-score">🌴 다낭 여행 동반 확률: ${score}%</div>
                    </div>
                </div>
            `;
        }
    });
}

function getAIComment(name, data) {
    const comments = {
        "강남미인": "세련되고 화려한 매력에 압도당하셨군요!",
        "일본여자": "투명한 일본 특유의 감성을 선호하시네요.",
        "오피스": "지적이고 스마트한 상대를 중시하시는군요.",
        "청순": "순수하고 맑은 느낌을 선호하시는 첫사랑 취향!",
        "운동": "함께 활동적인 데이트를 즐기고 싶은 건강미 취향!"
    };
    return comments[data.category] || `${data.category} 스타일을 정확히 짚어내셨네요!`;
}
</script>
</body>
</html>
