<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3인 전용: 현실 밀착형 100인 월드컵</title>
    <style>
        :root { --main-gold: #d4af37; --bg-dark: #121212; }
        body { background: var(--bg-dark); color: white; font-family: -apple-system, sans-serif; text-align: center; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .player-card { cursor: pointer; border: 2px solid #333; padding: 15px; border-radius: 20px; background: #1e1e1e; width: 150px; transition: 0.3s; display: inline-block; margin: 10px; }
        .player-card:hover { border-color: var(--main-gold); transform: translateY(-5px); }
        .p-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--main-gold); background: #333; }
        #game-screen { display: none; }
        .match-up { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .candidate { width: 45%; max-width: 400px; cursor: pointer; }
        .candidate img { width: 100%; height: auto; aspect-ratio: 2/3; border-radius: 15px; object-fit: cover; border: 3px solid #222; background: #222; }
        .candidate:hover img { border-color: var(--main-gold); }
        #result-screen { display: none; }
        .final-card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 280px; margin: 10px auto; border: 1px solid #333; }
        .win-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 10px; }
        button { background: var(--main-gold); color: black; border:none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor:pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="main-lobby">
    <h1 style="color: var(--main-gold);">Secret Ideal World Cup</h1>
    <div class="player-select">
        <div class="player-card" onclick="startGame('태구')">
            <img src="taegu.png" class="p-img" onerror="this.src='https://ui-avatars.com/api/?name=TG&background=d4af37&color=fff'">
            <h3>태구</h3>
        </div>
        <div class="player-card" onclick="startGame('민')">
            <img src="min.png" class="p-img" onerror="this.src='https://ui-avatars.com/api/?name=MIN&background=d4af37&color=fff'">
            <h3>민</h3>
        </div>
        <div class="player-card" onclick="startGame('충')">
            <img src="choong.png" class="p-img" onerror="this.src='https://ui-avatars.com/api/?name=CH&background=d4af37&color=fff'">
            <h3>충</h3>
        </div>
    </div>
</div>

<div class="container" id="game-screen">
    <h2 id="round-title" style="color: var(--main-gold);">16강</h2>
    <div class="match-up">
        <div id="left-side" class="candidate" onclick="selectWinner(0)"></div>
        <div style="font-size:30px; color:var(--main-gold); font-weight:900;">VS</div>
        <div id="right-side" class="candidate" onclick="selectWinner(1)"></div>
    </div>
    <button onclick="undo()" id="undo-btn" style="background:#444; color:#ccc; display:none;">뒤로가기</button>
</div>

<div class="container" id="result-screen">
    <h1 style="color: var(--main-gold);">Secret Dashboard</h1>
    <div id="dashboard-results" style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;"></div>
    <button onclick="location.reload()">다시 하기</button>
</div>

<script>
// --- 🔥 풍경 0% 보장: 인물이 확실히 나오는 엄선된 ID 리스트 ---
const pIds = [
    "1494790108377-be9c29b29330", "1534528741775-53994a69daeb", "1507003211169-0a1dd7228f2d", "1544005313-94ddf0286df2",
    "1506794778202-cad84cf45f1d", "1531746020798-e6953c6e8e04", "1524504388940-b1c1722653e1", "1517841905240-472988babdf9",
    "1438761681033-6461ffad8d80", "1500648767791-00dcc994a43e", "1488426862026-3ee34a7d66df", "1539571696357-5a69c17a67c6",
    "1519345182560-3f2917c472ef", "1492562080023-ab3db95bfbce", "1509305713942-83601abc8f85", "1520813792240-56fc4a3765a7",
    "1529626455594-215017963df5", "1508214751196-bcfd4ca60f91", "1499952127939-9bbf5af6c51c", "1525134479668-1bee5c7c6845"
];

const candidates = [];
for(let i=0; i<100; i++) {
    const id = pIds[i % pIds.length];
    // 주소 끝에 v=i를 붙여 사파리 캐시를 무력화하고 인물 사진 강제 로딩
    candidates.push({
        id: i,
        name: "Candidate #" + (i + 1),
        img: "https://images.unsplash.com/photo-" + id + "?w=600&h=900&fit=crop&auto=format"
    });
}

let user = "";
let pool = [];
let winners = [];
let currentPair = [];
let historyStack = [];

function startGame(name) {
    user = name;
    document.getElementById('main-lobby').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    pool = [...candidates].sort(() => Math.random() - 0.5).slice(0, 16);
    winners = [];
    historyStack = [];
    render();
}

function render() {
    if (pool.length === 1 && winners.length === 0) { finish(pool[0]); return; }
    if (pool.length === 0) { pool = [...winners]; winners = []; }
    const roundTitle = pool.length + (winners.length * 2);
    document.getElementById('round-title').innerText = roundTitle === 2 ? "🔥 결승전 🔥" : roundTitle + "강";
    document.getElementById('undo-btn').style.display = historyStack.length > 0 ? "inline-block" : "none";
    currentPair = [pool[0], pool[1]];
    document.getElementById('left-side').innerHTML = '<img src="' + currentPair[0].img + '"><p>' + currentPair[0].name + '</p>';
    document.getElementById('right-side').innerHTML = '<img src="' + currentPair[1].img + '"><p>' + currentPair[1].name + '</p>';
}

function selectWinner(idx) {
    historyStack.push({ p: [...pool], w: [...winners] });
    winners.push(currentPair[idx]);
    pool.splice(0, 2);
    render();
}

function undo() {
    if (historyStack.length === 0) return;
    const last = historyStack.pop();
    pool = last.p; winners = last.w; render();
}

function finish(winner) {
    const saved = JSON.parse(localStorage.getItem('final_v8') || '{}');
    saved[user] = winner;
    localStorage.setItem('final_v8', JSON.stringify(saved));
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    const board = document.getElementById('dashboard-results');
    board.innerHTML = "";
    ["태구", "민", "충"].forEach(n => {
        if(saved[n]) {
            board.innerHTML += '<div class="final-card"><h3>' + n + '의 픽</h3><img src="' + saved[n].img + '" class="win-img"><p style="color:#00ffcc; font-weight:bold;">다낭 여행 동반 확률: ' + (Math.floor(Math.random()*15)+82) + '%</p></div>';
        }
    });
}
</script>
</body>
</html>
